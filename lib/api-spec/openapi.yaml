openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.2.0
  description: Yastar API - multi-module business decision software
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: calculate
    description: Calculation engine (stateless)
  - name: account
    description: Current owner account/tier info
  - name: scenarios
    description: Saved scenarios
  - name: cost-items
    description: Saved HPP cost items
  - name: admin
    description: Internal admin dashboard
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /calculate/reverse-target:
    post:
      operationId: calculateReverseTarget
      tags: [calculate]
      summary: Reverse-calculate clients needed to hit a target profit
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReverseTargetInput"
      responses:
        "200":
          description: Calculated result with feasibility check and insights
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReverseTargetResult"
        "400":
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /calculate/break-even:
    post:
      operationId: calculateBreakEven
      tags: [calculate]
      summary: Calculate how long/how many clients a new hire needs to break even
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BreakEvenInput"
      responses:
        "200":
          description: Break-even projection
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BreakEvenResult"
        "400":
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /calculate/hpp:
    post:
      operationId: calculateHpp
      tags: [calculate]
      summary: Calculate HPP (Harga Pokok Produksi/Layanan) for a product or service
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/HppInput"
      responses:
        "200":
          description: HPP calculation result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HppResult"
        "400":
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /calculate/bep-usaha:
    post:
      operationId: calculateBepUsaha
      tags: [calculate]
      summary: Calculate business-level Break-Even Point (BEP Usaha)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BepUsahaInput"
      responses:
        "200":
          description: BEP Usaha result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BepUsahaResult"
        "400":
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /calculate/harga-jual:
    post:
      operationId: calculateHargaJual
      tags: [calculate]
      summary: Calculate optimal selling price or actual margin
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/HargaJualInput"
      responses:
        "200":
          description: Harga jual result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HargaJualResult"
        "400":
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /calculate/pajak:
    post:
      operationId: calculatePajak
      tags: [calculate]
      summary: Estimate monthly tax for UMKM (PPh Final 0.5% or PPh Pasal 17)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PajakInput"
      responses:
        "200":
          description: Pajak estimate
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PajakResult"
        "400":
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /calculate/ekspansi:
    post:
      operationId: calculateEkspansi
      tags: [calculate]
      summary: Evaluate feasibility of opening a new branch
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EkspansiInput"
      responses:
        "200":
          description: Ekspansi feasibility result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EkspansiResult"
        "400":
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /calculate/pinjaman:
    post:
      operationId: calculatePinjaman
      tags: [calculate]
      summary: Simulate a business loan (flat or annuity)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PinjamanInput"
      responses:
        "200":
          description: Pinjaman simulation result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PinjamanResult"
        "400":
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /me:
    get:
      operationId: getMyAccount
      tags: [account]
      summary: Get the current owner's account, tier and usage
      responses:
        "200":
          description: Account summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Account"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /cost-items:
    get:
      operationId: listCostItems
      tags: [cost-items]
      summary: List the current owner's saved HPP cost items
      responses:
        "200":
          description: List of cost items
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CostItem"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    post:
      operationId: createCostItem
      tags: [cost-items]
      summary: Save a new HPP cost item
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CostItemInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CostItem"
        "400":
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /scenarios:
    get:
      operationId: listScenarios
      tags: [scenarios]
      summary: List the current owner's saved scenarios (all module types)
      responses:
        "200":
          description: List of scenarios
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Scenario"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    post:
      operationId: createScenario
      tags: [scenarios]
      summary: Save a new target_mundur scenario
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ScenarioInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Scenario"
        "400":
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Scenario limit reached for current tier
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /scenarios/module:
    post:
      operationId: createModuleScenario
      tags: [scenarios]
      summary: Save a scenario for any module type (hpp, bep_usaha, harga_jual, etc.)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ModuleScenarioInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Scenario"
        "400":
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Scenario limit reached or module access denied
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /scenarios/{id}:
    get:
      operationId: getScenario
      tags: [scenarios]
      summary: Get a single saved scenario
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Scenario
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Scenario"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    patch:
      operationId: updateScenario
      tags: [scenarios]
      summary: Update/rename a saved scenario
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ScenarioUpdate"
      responses:
        "200":
          description: Updated scenario
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Scenario"
        "400":
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      operationId: deleteScenario
      tags: [scenarios]
      summary: Delete a saved scenario
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /admin/login:
    post:
      operationId: loginAdmin
      tags: [admin]
      summary: Log into the internal admin dashboard
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdminLoginInput"
      responses:
        "200":
          description: Logged in
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminSession"
        "401":
          description: Invalid password
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /admin/logout:
    post:
      operationId: logoutAdmin
      tags: [admin]
      summary: Log out of the admin dashboard
      responses:
        "204":
          description: Logged out

  /admin/session:
    get:
      operationId: getAdminSession
      tags: [admin]
      summary: Check if the current admin session is valid
      responses:
        "200":
          description: Admin session status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminSession"
        "401":
          description: Not authenticated as admin
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /admin/accounts:
    post:
      operationId: createAdminAccount
      tags: [admin]
      summary: Create a new owner account (admin only)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdminCreateAccountInput"
      responses:
        "201":
          description: Created account
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminAccountDetail"
        "400":
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Not authenticated as admin
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Email already exists
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    get:
      operationId: listAdminAccounts
      tags: [admin]
      summary: Search owner accounts by email (admin only)
      parameters:
        - name: search
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: Matching accounts
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AdminAccountSummary"
        "401":
          description: Not authenticated as admin
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /admin/accounts/{id}:
    get:
      operationId: getAdminAccount
      tags: [admin]
      summary: Get an owner account with its change history (admin only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Account detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminAccountDetail"
        "401":
          description: Not authenticated as admin
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    patch:
      operationId: updateAdminAccount
      tags: [admin]
      summary: Set an owner's tier, scenario limit, module access, and package expiry (admin only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdminAccountUpdate"
      responses:
        "200":
          description: Updated account
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminAccountDetail"
        "400":
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Not authenticated as admin
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    ErrorResponse:
      type: object
      required: [error]
      properties:
        error:
          type: string

    BusinessType:
      type: string
      enum: [barbershop, salon, nail, spa, custom]

    CommissionModel:
      type: string
      enum: [flat, base_plus_commission, tiered]

    Tier:
      type: string
      enum: [free, starter, professional]

    ModuleType:
      type: string
      enum:
        - target_mundur
        - break_even_karyawan
        - hpp
        - harga_jual
        - bep_usaha
        - ekspansi
        - pinjaman
        - pajak

    ModuleAccess:
      type: object
      properties:
        target_mundur:
          type: boolean
        break_even_karyawan:
          type: boolean
        hpp:
          type: boolean
        harga_jual:
          type: boolean
        bep_usaha:
          type: boolean
        ekspansi:
          type: boolean
        pinjaman:
          type: boolean
        pajak:
          type: boolean

    InsightSeverity:
      type: string
      enum: [info, success, warning, danger]

    Insight:
      type: object
      required: [severity, code, message]
      properties:
        severity:
          $ref: "#/components/schemas/InsightSeverity"
        code:
          type: string
        message:
          type: string

    ServiceItem:
      type: object
      required: [name, price, durationMinutes]
      properties:
        name:
          type: string
          minLength: 1
        price:
          type: number
          minimum: 0
        durationMinutes:
          type: integer
          minimum: 1

    CommissionTier:
      type: object
      required: [minClients, percent]
      properties:
        minClients:
          type: integer
          minimum: 0
        percent:
          type: number
          minimum: 0
          maximum: 100

    CommissionConfig:
      type: object
      properties:
        flatPercent:
          type: ["number", "null"]
          minimum: 0
          maximum: 100
        baseSalary:
          type: ["number", "null"]
          minimum: 0
        baseCommissionPercent:
          type: ["number", "null"]
          minimum: 0
          maximum: 100
        tiers:
          type: ["array", "null"]
          items:
            $ref: "#/components/schemas/CommissionTier"

    ReverseTargetInput:
      type: object
      required:
        - businessType
        - employeeCount
        - workingDaysPerMonth
        - workingHoursPerDay
        - fixedCosts
        - targetProfit
        - commissionModel
        - commissionConfig
        - services
      properties:
        businessType:
          $ref: "#/components/schemas/BusinessType"
        employeeCount:
          type: integer
          minimum: 1
        workingDaysPerMonth:
          type: integer
          minimum: 1
          maximum: 31
        workingHoursPerDay:
          type: number
          minimum: 1
          maximum: 24
        fixedCosts:
          type: number
          minimum: 0
        targetProfit:
          type: number
          minimum: 0
        commissionModel:
          $ref: "#/components/schemas/CommissionModel"
        commissionConfig:
          $ref: "#/components/schemas/CommissionConfig"
        services:
          type: array
          minItems: 1
          items:
            $ref: "#/components/schemas/ServiceItem"

    ReverseTargetResult:
      type: object
      required:
        - avgServicePrice
        - avgServiceDurationMinutes
        - effectiveCommissionPercent
        - netProfitPerClient
        - totalCostsMonthly
        - clientsNeededTotal
        - clientsNeededPerEmployee
        - clientsNeededPerDayPerEmployee
        - maxCapacityPerEmployeePerMonth
        - maxCapacityTotalPerMonth
        - utilizationPercent
        - marginPercent
        - isRealistic
        - insights
      properties:
        avgServicePrice:
          type: number
        avgServiceDurationMinutes:
          type: number
        effectiveCommissionPercent:
          type: number
        netProfitPerClient:
          type: number
        totalCostsMonthly:
          type: number
        clientsNeededTotal:
          type: number
        clientsNeededPerEmployee:
          type: number
        clientsNeededPerDayPerEmployee:
          type: number
        maxCapacityPerEmployeePerMonth:
          type: number
        maxCapacityTotalPerMonth:
          type: number
        utilizationPercent:
          type: number
        marginPercent:
          type: number
        isRealistic:
          type: boolean
        insights:
          type: array
          items:
            $ref: "#/components/schemas/Insight"

    BreakEvenInput:
      type: object
      required:
        - avgServicePrice
        - commissionModel
        - commissionConfig
        - monthlyOverheadShare
        - estimatedClientsPerDay
      properties:
        avgServicePrice:
          type: number
          minimum: 0
        commissionModel:
          $ref: "#/components/schemas/CommissionModel"
        commissionConfig:
          $ref: "#/components/schemas/CommissionConfig"
        monthlyOverheadShare:
          type: number
          minimum: 0
        estimatedClientsPerDay:
          type: number
          minimum: 0.1

    BreakEvenResult:
      type: object
      required:
        - netProfitPerClient
        - monthlyFixedCostOfHire
        - breakEvenClientsNeeded
        - breakEvenDays
        - breakEvenWeeks
        - breakEvenMonths
        - insights
      properties:
        netProfitPerClient:
          type: number
        monthlyFixedCostOfHire:
          type: number
        breakEvenClientsNeeded:
          type: number
        breakEvenDays:
          type: number
        breakEvenWeeks:
          type: number
        breakEvenMonths:
          type: number
        insights:
          type: array
          items:
            $ref: "#/components/schemas/Insight"

    # ─── HPP ─────────────────────────────────────────────────────────────────

    RawMaterialItem:
      type: object
      required: [name, qty, unitPrice]
      properties:
        name:
          type: string
        qty:
          type: number
          minimum: 0
        unitPrice:
          type: number
          minimum: 0

    HppInput:
      type: object
      required: [mode, nama]
      properties:
        mode:
          type: string
          enum: [produk, jasa]
        nama:
          type: string
          minLength: 1
        sellingPrice:
          type: ["number", "null"]
          minimum: 0
        # produk fields
        rawMaterials:
          type: array
          items:
            $ref: "#/components/schemas/RawMaterialItem"
          default: []
        directLaborCostPerUnit:
          type: number
          minimum: 0
          default: 0
        monthlyOverhead:
          type: number
          minimum: 0
          default: 0
        estimatedUnitsPerMonth:
          type: number
          minimum: 1
          default: 1
        packagingCostPerUnit:
          type: number
          minimum: 0
          default: 0
        # jasa fields
        consumablesPerSession:
          type: array
          items:
            $ref: "#/components/schemas/RawMaterialItem"
          default: []
        monthlyFixedCosts:
          type: number
          minimum: 0
          default: 0
        estimatedSessionsPerMonth:
          type: number
          minimum: 1
          default: 1
        therapistCommissionPerSession:
          type: number
          minimum: 0
          default: 0

    HppResult:
      type: object
      required: [hpp, insights, breakdown]
      properties:
        hpp:
          type: number
        sellingPrice:
          type: ["number", "null"]
        margin:
          type: ["number", "null"]
        markup:
          type: ["number", "null"]
        breakdown:
          type: object
          additionalProperties:
            type: number
        insights:
          type: array
          items:
            $ref: "#/components/schemas/Insight"

    # ─── BEP Usaha ───────────────────────────────────────────────────────────

    BepUsahaInput:
      type: object
      required: [totalBiayaTetapBulanan, hargaJualPerUnit, hppPerUnit]
      properties:
        totalBiayaTetapBulanan:
          type: number
          minimum: 0
        hargaJualPerUnit:
          type: number
          minimum: 0
        hppPerUnit:
          type: number
          minimum: 0

    BepUsahaResult:
      type: object
      required: [kontribusiMarginPerUnit, unitBepBulanan, revenueBepBulanan, insights]
      properties:
        kontribusiMarginPerUnit:
          type: number
        unitBepBulanan:
          type: number
        revenueBepBulanan:
          type: number
        insights:
          type: array
          items:
            $ref: "#/components/schemas/Insight"

    # ─── Harga Jual ──────────────────────────────────────────────────────────

    HargaJualInput:
      type: object
      required: [mode, hpp]
      properties:
        mode:
          type: string
          enum: [dari_hpp, dari_harga]
        hpp:
          type: number
          minimum: 0
        targetMarginPercent:
          type: ["number", "null"]
          minimum: 0
          maximum: 99.99
        targetMarkupPercent:
          type: ["number", "null"]
          minimum: 0
        hargaJual:
          type: ["number", "null"]
          minimum: 0

    HargaJualResult:
      type: object
      required: [mode, hpp, insights]
      properties:
        mode:
          type: string
        hpp:
          type: number
        hargaDariMargin:
          type: ["number", "null"]
        hargaDariMarkup:
          type: ["number", "null"]
        marginAktual:
          type: ["number", "null"]
        markupAktual:
          type: ["number", "null"]
        insights:
          type: array
          items:
            $ref: "#/components/schemas/Insight"

    # ─── Pajak ───────────────────────────────────────────────────────────────

    PajakInput:
      type: object
      required: [omzetBulanan, skema]
      properties:
        omzetBulanan:
          type: number
          minimum: 0
        skema:
          type: string
          enum: [ppfinal, normal]
        totalBiayaBulanan:
          type: ["number", "null"]
          minimum: 0

    PajakResult:
      type: object
      required: [pajakBulanan, skema, disclaimer, insights]
      properties:
        pajakBulanan:
          type: number
        skema:
          type: string
        disclaimer:
          type: string
        insights:
          type: array
          items:
            $ref: "#/components/schemas/Insight"

    # ─── Ekspansi ────────────────────────────────────────────────────────────

    EkspansiInput:
      type: object
      required: [modalAwal, revenueBulanan, biayaTetapBulanan, hppPercentOfRevenue]
      properties:
        modalAwal:
          type: number
          minimum: 0
        revenueBulanan:
          type: number
          minimum: 0
        biayaTetapBulanan:
          type: number
          minimum: 0
        hppPercentOfRevenue:
          type: number
          minimum: 0
          maximum: 100

    EkspansiResult:
      type: object
      required: [profitBulananProyeksi, paybackPeriodBulan, paybackPeriodTahun, roiTahunan, insights]
      properties:
        profitBulananProyeksi:
          type: number
        paybackPeriodBulan:
          type: number
        paybackPeriodTahun:
          type: number
        roiTahunan:
          type: number
        insights:
          type: array
          items:
            $ref: "#/components/schemas/Insight"

    # ─── Pinjaman ────────────────────────────────────────────────────────────

    PinjamanInput:
      type: object
      required: [plafonPinjaman, sukuBungaTahunan, tenorBulan, metode]
      properties:
        plafonPinjaman:
          type: number
          minimum: 0
        sukuBungaTahunan:
          type: number
          minimum: 0
          maximum: 100
        tenorBulan:
          type: integer
          minimum: 1
          maximum: 360
        metode:
          type: string
          enum: [flat, anuitas]
        profitBulananSaatIni:
          type: ["number", "null"]
          minimum: 0

    JadwalCicilan:
      type: object
      required: [bulan, pokokBayar, bungaBayar, totalCicilan, saldo]
      properties:
        bulan:
          type: integer
        pokokBayar:
          type: number
        bungaBayar:
          type: number
        totalCicilan:
          type: number
        saldo:
          type: number

    PinjamanResult:
      type: object
      required: [cicilanBulanan, totalBunga, totalPembayaran, jadwal, insights]
      properties:
        cicilanBulanan:
          type: number
        totalBunga:
          type: number
        totalPembayaran:
          type: number
        profitSetelahCicilan:
          type: ["number", "null"]
        jadwal:
          type: array
          items:
            $ref: "#/components/schemas/JadwalCicilan"
        insights:
          type: array
          items:
            $ref: "#/components/schemas/Insight"

    # ─── Cost Items ──────────────────────────────────────────────────────────

    CostItemInput:
      type: object
      required: [nama, mode, hppInput, hppResult]
      properties:
        nama:
          type: string
          minLength: 1
        mode:
          type: string
          enum: [produk, jasa]
        hppInput:
          type: object
          additionalProperties: true
        hppResult:
          type: object
          additionalProperties: true

    CostItem:
      type: object
      required: [id, nama, mode, hppInput, hppResult, createdAt, updatedAt]
      properties:
        id:
          type: integer
        nama:
          type: string
        mode:
          type: string
        hppInput:
          type: object
          additionalProperties: true
        hppResult:
          type: object
          additionalProperties: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    # ─── Scenarios ───────────────────────────────────────────────────────────

    Scenario:
      type: object
      required:
        - id
        - name
        - moduleType
        - businessType
        - employeeCount
        - workingDaysPerMonth
        - workingHoursPerDay
        - fixedCosts
        - targetProfit
        - commissionModel
        - commissionConfig
        - services
        - resultSnapshot
        - createdAt
        - updatedAt
      properties:
        id:
          type: integer
        name:
          type: string
        moduleType:
          type: string
          default: target_mundur
        moduleInput:
          type: ["object", "null"]
          additionalProperties: true
        businessType:
          type: string
        employeeCount:
          type: integer
        workingDaysPerMonth:
          type: integer
        workingHoursPerDay:
          type: number
        fixedCosts:
          type: number
        targetProfit:
          type: number
        commissionModel:
          type: string
        commissionConfig:
          type: object
          additionalProperties: true
        services:
          type: array
          items:
            type: object
            additionalProperties: true
        resultSnapshot:
          type: object
          additionalProperties: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    ScenarioInput:
      type: object
      required:
        - name
        - businessType
        - employeeCount
        - workingDaysPerMonth
        - workingHoursPerDay
        - fixedCosts
        - targetProfit
        - commissionModel
        - commissionConfig
        - services
      properties:
        name:
          type: string
          minLength: 1
        businessType:
          $ref: "#/components/schemas/BusinessType"
        employeeCount:
          type: integer
          minimum: 1
        workingDaysPerMonth:
          type: integer
          minimum: 1
          maximum: 31
        workingHoursPerDay:
          type: number
          minimum: 1
          maximum: 24
        fixedCosts:
          type: number
          minimum: 0
        targetProfit:
          type: number
          minimum: 0
        commissionModel:
          $ref: "#/components/schemas/CommissionModel"
        commissionConfig:
          $ref: "#/components/schemas/CommissionConfig"
        services:
          type: array
          minItems: 1
          items:
            $ref: "#/components/schemas/ServiceItem"

    ScenarioUpdate:
      type: object
      properties:
        name:
          type: string
          minLength: 1
        businessType:
          $ref: "#/components/schemas/BusinessType"
        employeeCount:
          type: integer
          minimum: 1
        workingDaysPerMonth:
          type: integer
          minimum: 1
          maximum: 31
        workingHoursPerDay:
          type: number
          minimum: 1
          maximum: 24
        fixedCosts:
          type: number
          minimum: 0
        targetProfit:
          type: number
          minimum: 0
        commissionModel:
          $ref: "#/components/schemas/CommissionModel"
        commissionConfig:
          $ref: "#/components/schemas/CommissionConfig"
        services:
          type: array
          minItems: 1
          items:
            $ref: "#/components/schemas/ServiceItem"

    ModuleScenarioInput:
      type: object
      required: [name, moduleType, moduleInput, resultSnapshot]
      properties:
        name:
          type: string
          minLength: 1
        moduleType:
          type: string
          minLength: 1
        moduleInput:
          type: object
          additionalProperties: true
        resultSnapshot:
          type: object
          additionalProperties: true

    # ─── Account ─────────────────────────────────────────────────────────────

    Account:
      type: object
      required:
        - id
        - email
        - businessName
        - tier
        - scenarioLimit
        - scenarioCount
        - exportEnabled
        - benchmarkAccess
        - packageStartedAt
        - packageExpiresAt
      properties:
        id:
          type: integer
        email:
          type: string
        businessName:
          type: ["string", "null"]
        tier:
          $ref: "#/components/schemas/Tier"
        scenarioLimit:
          type: ["integer", "null"]
          description: Null means unlimited
        scenarioCount:
          type: integer
        exportEnabled:
          type: boolean
        benchmarkAccess:
          type: boolean
        moduleAccess:
          oneOf:
            - $ref: "#/components/schemas/ModuleAccess"
            - type: "null"
        packageStartedAt:
          type: ["string", "null"]
          format: date-time
        packageExpiresAt:
          type: ["string", "null"]
          format: date-time

    AdminLoginInput:
      type: object
      required: [password]
      properties:
        password:
          type: string
          minLength: 1

    AdminSession:
      type: object
      required: [authenticated]
      properties:
        authenticated:
          type: boolean

    AdminAccountSummary:
      type: object
      required:
        - id
        - email
        - businessName
        - tier
        - scenarioCount
        - scenarioLimit
        - exportEnabled
        - benchmarkAccess
        - packageExpiresAt
        - createdAt
      properties:
        id:
          type: integer
        email:
          type: string
        businessName:
          type: ["string", "null"]
        tier:
          $ref: "#/components/schemas/Tier"
        scenarioCount:
          type: integer
        scenarioLimit:
          type: ["integer", "null"]
        exportEnabled:
          type: boolean
        benchmarkAccess:
          type: boolean
        moduleAccess:
          oneOf:
            - $ref: "#/components/schemas/ModuleAccess"
            - type: "null"
        packageExpiresAt:
          type: ["string", "null"]
          format: date-time
        createdAt:
          type: string
          format: date-time

    AdminHistoryEntry:
      type: object
      required:
        - id
        - previousTier
        - newTier
        - previousExpiresAt
        - newExpiresAt
        - note
        - createdAt
      properties:
        id:
          type: integer
        previousTier:
          $ref: "#/components/schemas/Tier"
        newTier:
          $ref: "#/components/schemas/Tier"
        previousExpiresAt:
          type: ["string", "null"]
          format: date-time
        newExpiresAt:
          type: ["string", "null"]
          format: date-time
        note:
          type: ["string", "null"]
        createdAt:
          type: string
          format: date-time

    AdminAccountDetail:
      type: object
      required:
        - id
        - email
        - businessName
        - tier
        - scenarioCount
        - scenarioLimit
        - exportEnabled
        - benchmarkAccess
        - packageStartedAt
        - packageExpiresAt
        - createdAt
        - history
      properties:
        id:
          type: integer
        email:
          type: string
        businessName:
          type: ["string", "null"]
        tier:
          $ref: "#/components/schemas/Tier"
        scenarioCount:
          type: integer
        scenarioLimit:
          type: ["integer", "null"]
        exportEnabled:
          type: boolean
        benchmarkAccess:
          type: boolean
        moduleAccess:
          oneOf:
            - $ref: "#/components/schemas/ModuleAccess"
            - type: "null"
        packageStartedAt:
          type: ["string", "null"]
          format: date-time
        packageExpiresAt:
          type: ["string", "null"]
          format: date-time
        createdAt:
          type: string
          format: date-time
        history:
          type: array
          items:
            $ref: "#/components/schemas/AdminHistoryEntry"

    AdminCreateAccountInput:
      type: object
      required: [email, tier]
      properties:
        email:
          type: string
          minLength: 3
        businessName:
          type: ["string", "null"]
        tier:
          $ref: "#/components/schemas/Tier"
        scenarioLimit:
          type: ["integer", "null"]
        exportEnabled:
          type: boolean
        benchmarkAccess:
          type: boolean
        moduleAccess:
          oneOf:
            - $ref: "#/components/schemas/ModuleAccess"
            - type: "null"
        packageStartedAt:
          type: ["string", "null"]
          format: date-time
        packageExpiresAt:
          type: ["string", "null"]
          format: date-time

    AdminAccountUpdate:
      type: object
      properties:
        tier:
          $ref: "#/components/schemas/Tier"
        scenarioLimit:
          type: ["integer", "null"]
        exportEnabled:
          type: boolean
        benchmarkAccess:
          type: boolean
        moduleAccess:
          oneOf:
            - $ref: "#/components/schemas/ModuleAccess"
            - type: "null"
        packageStartedAt:
